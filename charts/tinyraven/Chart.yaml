apiVersion: v2
name: tinyraven
description: |-
  TinyRaven — open-source, self-hosted, drop-in alternative to Tinybird.
  A single Go binary (tr) in front of OSS ClickHouse + Redis.
  ClickHouse and Redis are EXTERNAL to this chart (point the values at them).
type: application
# Chart version — bump on chart changes.
version: 0.1.0
# Tracks the tr / image version this chart was validated against.
appVersion: "latest"
home: https://github.com/ravencloak-org/tiny
sources:
  - https://github.com/ravencloak-org/tiny
keywords:
  - analytics
  - clickhouse
  - tinybird
  - events
maintainers:
  - name: Ravencloak
    email: oss@ravencloak.org
