apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tinyraven.fullname" . }}
  labels:
    {{- include "tinyraven.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "tinyraven.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tinyraven.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
              protocol: TCP
          env:
            - name: TR_HTTP_ADDR
              value: {{ .Values.env.httpAddr | quote }}
            - name: TR_PROJECT_DIR
              value: {{ .Values.env.projectDir | quote }}
            - name: TR_CLICKHOUSE_HTTP
              value: {{ .Values.env.clickhouse.http | quote }}
            - name: TR_CLICKHOUSE_NATIVE
              value: {{ .Values.env.clickhouse.native | quote }}
            - name: TR_CLICKHOUSE_DB
              value: {{ .Values.env.clickhouse.db | quote }}
            - name: TR_CLICKHOUSE_USER
              value: {{ .Values.env.clickhouse.user | quote }}
            - name: TR_REDIS_ADDR
              value: {{ .Values.env.redis.addr | quote }}
            - name: TR_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "tinyraven.secretName" . }}
                  key: TR_ADMIN_TOKEN
            - name: TR_CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "tinyraven.secretName" . }}
                  key: TR_CLICKHOUSE_PASSWORD
                  optional: true
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
