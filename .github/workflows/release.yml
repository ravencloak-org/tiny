name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub release
  packages: write   # push image to ghcr

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          # Single-arch x86 for prod/cloud deploy targets (no multi-arch/QEMU).
          # Local dev on Apple Silicon builds arm64 natively via `docker compose build`.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Build and push marketing site image
        uses: docker/build-push-action@v7
        with:
          context: ./site
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-site:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}-site:latest

      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file CHANGELOG.md --verify-tag || gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-dokploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      # Pins the Dokploy compose env to this release's VERSION tag, then deploys.
      # A version tag (not :latest) is a new image reference, so Dokploy always
      # pulls the new digest — the webhook+:latest path recreated from cache and
      # never updated. compose.update REPLACES the env blob, so we rebuild it in
      # full (TR_ADMIN_TOKEN must be a repo secret). Skips cleanly if DOKPLOY_TOKEN
      # is unset. Requires the Dokploy panel reachable at DOKPLOY_URL.
      - name: Deploy to Dokploy (version-tagged)
        env:
          DOKPLOY_URL: https://dokploy.jobin.wtf
          DOKPLOY_TOKEN: ${{ secrets.DOKPLOY_TOKEN }}
          COMPOSE_ID: HHL9RZlnr5lErt91OJjwQ
          TR_ADMIN_TOKEN: ${{ secrets.TR_ADMIN_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "${DOKPLOY_TOKEN}" ]; then
            echo "DOKPLOY_TOKEN not set — skipping Dokploy deploy."
            exit 0
          fi
          env_blob=$(printf 'TR_ADMIN_TOKEN=%s\nTINYRAVEN_TAG=%s\nSITE_TAG=%s\n' \
            "${TR_ADMIN_TOKEN}" "${TAG}" "${TAG}")
          echo "Pinning Dokploy compose env to ${TAG}..."
          jq -n --arg id "$COMPOSE_ID" --arg env "$env_blob" '{composeId:$id, env:$env}' \
            | curl -fsS -X POST "${DOKPLOY_URL}/api/compose.update" \
                -H "x-api-key: ${DOKPLOY_TOKEN}" -H "Content-Type: application/json" \
                --data @- >/dev/null
          echo "Deploying ${TAG}..."
          curl -fsS -X POST "${DOKPLOY_URL}/api/compose.deploy" \
            -H "x-api-key: ${DOKPLOY_TOKEN}" -H "Content-Type: application/json" \
            --data "$(jq -n --arg id "$COMPOSE_ID" '{composeId:$id}')" >/dev/null
          echo "Dokploy deploy triggered for ${TAG}."
