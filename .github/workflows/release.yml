name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub release
  packages: write   # push image to ghcr

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Single-arch x86 for prod/cloud deploy targets (no multi-arch/QEMU).
          # Local dev on Apple Silicon builds arm64 natively via `docker compose build`.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes-file CHANGELOG.md --verify-tag || gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-dokploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      # Triggers a redeploy on your Dokploy instance. Set the repo secret
      # DOKPLOY_DEPLOY_WEBHOOK to the application's "Deploy Webhook" URL
      # (Dokploy app → Deployments → Webhook). No-op if the secret is unset.
      - name: Trigger Dokploy deploy
        run: |
          if [ -z "${DOKPLOY_DEPLOY_WEBHOOK}" ]; then
            echo "DOKPLOY_DEPLOY_WEBHOOK not set — skipping Dokploy deploy."
            exit 0
          fi
          echo "Triggering Dokploy deploy for ${{ github.ref_name }}..."
          curl -fsSL -X POST "${DOKPLOY_DEPLOY_WEBHOOK}"
        env:
          DOKPLOY_DEPLOY_WEBHOOK: ${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}
