name: APT/RPM Repo Publish

# Publishes a GPG-signed APT repository (and, as a bonus, a signed yum/dnf repo)
# to the gh-pages branch on every v* tag. It runs ALONGSIDE goreleaser.yml (which
# builds + uploads the .deb/.rpm assets to the GitHub Release) and helm-publish.yml
# (which writes index.yaml to gh-pages root). To avoid clobbering the Helm repo we
# sync ONLY the apt/ and rpm/ subtrees (rsync --delete) and never write the
# gh-pages root, so the Helm index.yaml/index.html/.nojekyll survive. A shared
# concurrency group serializes this against helm-publish so the two never race.
#
# End result for users:
#   curl -fsSL https://ravencloak-org.github.io/tiny/apt/KEY.gpg \
#     | sudo gpg --dearmor -o /usr/share/keyrings/tinyraven.gpg
#   echo "deb [signed-by=/usr/share/keyrings/tinyraven.gpg] \
#     https://ravencloak-org.github.io/tiny/apt stable main" \
#     | sudo tee /etc/apt/sources.list.d/tinyraven.list
#   sudo apt-get update && sudo apt-get install tinyraven
#
# Requires repo secret GPG_PRIVATE_KEY (+ optional GPG_PASSPHRASE) — the SAME key
# goreleaser.yml uses to sign checksums. If that secret is absent the job skips
# cleanly (an unsigned apt repo is useless, so there is nothing to publish).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)publish, e.g. v0.1.0"
        required: true

# Serialize ALL gh-pages writers (this + helm-publish.yml) under one shared
# group so apt/rpm and the Helm index.yaml can never push concurrently and
# reject each other. cancel-in-progress:false → runs queue, none are dropped.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

permissions:
  contents: write # read the release assets + push to gh-pages

jobs:
  # Gate the whole thing on the signing key existing. Secrets can't be read in a
  # job-level `if`, so we surface the presence as an output here and depend on it.
  guard:
    runs-on: ubuntu-latest
    outputs:
      has_gpg: ${{ steps.flag.outputs.has }}
    steps:
      - id: flag
        run: echo "has=${{ secrets.GPG_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"

  publish:
    needs: guard
    if: needs.guard.outputs.has_gpg == 'true'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install repo tooling
        run: |
          sudo apt-get update
          # dpkg-dev → dpkg-scanpackages; apt-utils → apt-ftparchive; createrepo-c → rpm repo.
          sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils createrepo-c

      - name: Import GPG key
        id: gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      # goreleaser.yml uploads the .deb/.rpm assets to the SAME tag, concurrently.
      # Poll the release until the Linux packages show up before we build the repo.
      - name: Wait for release packages
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            debs=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
              --json assets -q '[.assets[].name | select(endswith(".deb"))] | length' 2>/dev/null || echo 0)
            if [ "${debs:-0}" -ge 2 ]; then
              echo "Found $debs .deb assets on $TAG."; exit 0
            fi
            echo "Attempt $i/30 — .deb assets not ready yet (have ${debs:-0}); sleeping 20s…"
            sleep 20
          done
          echo "::error::Timed out waiting for .deb assets on release $TAG"; exit 1

      - name: Download release packages
        run: |
          set -euo pipefail
          mkdir -p dl
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" -p '*.deb' -D dl/
          # .rpm is best-effort (powers the bonus yum/dnf repo); don't fail without it.
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" -p '*.rpm' -D dl/ || true
          echo "Downloaded:"; ls -la dl/

      - name: Build signed APT repository
        env:
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
        run: |
          set -euo pipefail
          # Standard dists layout: <base>/apt  suite=stable  component=main  arch=amd64,arm64
          base=public/apt
          mkdir -p "$base/pool/main"
          # Bring the already-published pool in so keep-2 spans releases. The
          # publish step below mirrors public/apt/ onto gh-pages with rsync
          # --delete, so anything NOT carried forward here is removed from the
          # remote. Pull prior .debs, prune to 2, and only the surplus is deleted.
          git fetch --no-tags --depth=1 origin gh-pages >/dev/null 2>&1 || true
          git archive origin/gh-pages -- apt/pool 2>/dev/null | tar -x -C public || true
          cp dl/*.deb "$base/pool/main/"

          # ponytail: keep-2 ceiling — retain only the 2 newest versions of each
          # package+arch in the pool BEFORE the index regenerates, so the published
          # Packages references only the kept .debs and the repo can't grow unbounded.
          # Filenames are tinyraven_<ver>_<arch>.deb; version-sort per name+arch, drop the rest.
          pool="$base/pool/main"
          ls -1 "$pool"/*.deb 2>/dev/null | sed 's#.*/##' | awk -F_ 'NF>=3{print $1"_"$3}' | sort -u \
            | while IFS= read -r key; do
                name=${key%_*}; archdeb=${key#*_}
                ls -1 "$pool/${name}_"*"_${archdeb}" 2>/dev/null | sort -V | head -n -2 \
                  | xargs -r rm -vf -- || true
              done || true

          for arch in amd64 arm64; do
            dir="$base/dists/stable/main/binary-$arch"
            mkdir -p "$dir"
            # Generate Packages from the pool, filtered to this arch (paths stay
            # relative to the apt base so Filename: resolves under /apt/pool/...).
            ( cd "$base" && dpkg-scanpackages --arch "$arch" pool ) > "$dir/Packages"
            gzip -9kf "$dir/Packages"
          done

          # Release file (indexes every Packages + hashes) — generated relative to base.
          ( cd "$base" && apt-ftparchive \
              -o APT::FTPArchive::Release::Origin="TinyRaven" \
              -o APT::FTPArchive::Release::Label="TinyRaven" \
              -o APT::FTPArchive::Release::Suite="stable" \
              -o APT::FTPArchive::Release::Codename="stable" \
              -o APT::FTPArchive::Release::Components="main" \
              -o APT::FTPArchive::Release::Architectures="amd64 arm64" \
              release dists/stable ) > "$base/dists/stable/Release"

          # Detached + inline signatures so both `deb` and modern InRelease clients work.
          gpg --batch --yes --local-user "$GPG_FINGERPRINT" \
            --output "$base/dists/stable/Release.gpg" --detach-sign --armor "$base/dists/stable/Release"
          gpg --batch --yes --local-user "$GPG_FINGERPRINT" \
            --output "$base/dists/stable/InRelease" --clearsign "$base/dists/stable/Release"

          # Public key users import via signed-by=.
          gpg --batch --yes --armor --export "$GPG_FINGERPRINT" > "$base/KEY.gpg"
          echo "APT repo built:"; find "$base" -type f | sort

      - name: Build signed RPM repository (best-effort)
        env:
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
        run: |
          set -euo pipefail
          if ! ls dl/*.rpm >/dev/null 2>&1; then
            echo "No .rpm assets found — skipping yum/dnf repo."; exit 0
          fi
          base=public/rpm
          mkdir -p "$base"
          # Reconcile against the already-published rpms so keep-2 spans releases
          # (the publish step mirrors public/rpm/ with rsync --delete).
          git fetch --no-tags --depth=1 origin gh-pages >/dev/null 2>&1 || true
          git archive origin/gh-pages -- rpm 2>/dev/null | tar -x -C public --wildcards 'rpm/*.rpm' || true
          cp dl/*.rpm "$base/"

          # ponytail: keep-2 ceiling for the rpm dir too (same gh-pages accretion).
          # Group by the trailing .<arch>.rpm, version-sort, drop all but the newest 2
          # before createrepo_c regenerates repomd so it indexes only the kept files.
          for arch in $(ls -1 "$base"/*.rpm 2>/dev/null | sed -E 's#.*\.([^.]+)\.rpm$#\1#' | sort -u); do
            ls -1 "$base"/*."$arch".rpm 2>/dev/null | sort -V | head -n -2 | xargs -r rm -vf -- || true
          done

          createrepo_c "$base"
          # Sign the repomd so dnf can verify with repo_gpgcheck=1.
          gpg --batch --yes --local-user "$GPG_FINGERPRINT" \
            --detach-sign --armor "$base/repodata/repomd.xml"
          cp public/apt/KEY.gpg "$base/KEY.gpg"
          # Drop-in .repo definition users can curl into /etc/yum.repos.d/.
          cat > "$base/tinyraven.repo" <<'EOF'
          [tinyraven]
          name=TinyRaven
          baseurl=https://ravencloak-org.github.io/tiny/rpm
          enabled=1
          gpgcheck=1
          repo_gpgcheck=1
          gpgkey=https://ravencloak-org.github.io/tiny/rpm/KEY.gpg
          EOF
          echo "RPM repo built:"; find "$base" -type f | sort

      # ponytail: SCOPED, delete-aware sync replaces peaceiris keep_files:true.
      # keep_files never deleted remote blobs, so pruned .deb/.rpm files lingered
      # on gh-pages forever. We instead clone gh-pages and rsync ONLY the apt/ and
      # rpm/ subtrees with --delete. rsync only ever writes or deletes UNDER the
      # destination dir handed to it, so every gh-pages root file (Helm's
      # index.yaml, index.html, .nojekyll, anything not in apt/ or rpm/) is
      # provably untouched. The keep-2 prune above already bounded public/apt|rpm,
      # so --delete now actually propagates those removals to the remote.
      # Ceiling: a release that ships NO .rpm leaves the published rpm/ subtree
      # alone (best-effort) instead of wiping it.
      - name: Publish apt/ + rpm/ to gh-pages (scoped, delete-aware)
        run: |
          set -euo pipefail
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          work="$(mktemp -d)/gh-pages"

          # The shared concurrency group already serializes us against
          # helm-publish, so a non-fast-forward should not happen; the retry is
          # cheap insurance against any transient/external push. Each attempt
          # re-clones the latest tip so we always rebase onto current root files.
          for attempt in 1 2 3; do
            rm -rf "$work"
            if git clone --depth=1 --branch gh-pages "$remote" "$work" 2>/dev/null; then
              :
            else
              # gh-pages doesn't exist yet (e.g. apt ran before helm on a fresh
              # repo) — start a clean orphan branch with no root files to protect.
              git clone --depth=1 "$remote" "$work"
              git -C "$work" checkout --orphan gh-pages
              git -C "$work" rm -rf . >/dev/null 2>&1 || true
            fi

            # apt/ is always rebuilt (guard waits for >=2 .deb), so mirror it.
            mkdir -p "$work/apt"
            rsync -a --delete public/apt/ "$work/apt/"

            # rpm/ is best-effort: only mirror when this run actually built one,
            # otherwise leave the published rpm repo untouched.
            paths=(apt)
            if [ -d public/rpm ]; then
              mkdir -p "$work/rpm"
              rsync -a --delete public/rpm/ "$work/rpm/"
              paths+=(rpm)
            fi

            git -C "$work" add -A "${paths[@]}"
            if git -C "$work" diff --cached --quiet; then
              echo "No apt/rpm changes to publish."; exit 0
            fi
            git -C "$work" commit -m "apt/rpm: publish ${TAG}"
            if git -C "$work" push origin gh-pages; then
              echo "Published apt/rpm for ${TAG}."; exit 0
            fi
            echo "Push raced (attempt ${attempt}/3) — re-cloning and retrying…"
          done
          echo "::error::Failed to push apt/rpm to gh-pages after 3 attempts"; exit 1
