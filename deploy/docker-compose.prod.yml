# One-click production stack for Dokploy: ClickHouse + Redis + TinyRaven.
# Dokploy → Create → Docker Compose → point at this file. It clones the repo,
# so relative paths resolve. Set the env in Dokploy (or a .env next to this).
#
# Local test:  docker compose -f deploy/docker-compose.prod.yml up -d
services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    environment:
      CLICKHOUSE_DB: ${TR_CLICKHOUSE_DB:-tr_main}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data
    restart: unless-stopped

  tinyraven:
    # Tracks :latest; pull_policy:always makes every redeploy fetch the newest
    # image. The release workflow rebuilds :latest on each v* tag and pings the
    # Dokploy deploy webhook -> prod updates with no version env to bump.
    image: ghcr.io/ravencloak-org/tiny:latest
    pull_policy: always
    command: ["serve"]
    # Host port defaults to an uncommon value to dodge collisions on shared
    # hosts (Dokploy/Traefik often hold 80/8000/8080). Override with TR_PORT.
    # With Dokploy domain routing, the host publish is optional — Traefik reaches
    # the container's internal :8000 directly.
    ports:
      - "${TR_PORT:-18000}:8000"
    environment:
      TR_HTTP_ADDR: ":8000"
      TR_CLICKHOUSE_HTTP: "http://clickhouse:8123"
      TR_CLICKHOUSE_NATIVE: "clickhouse:9000"
      TR_CLICKHOUSE_DB: "${TR_CLICKHOUSE_DB:-tr_main}"
      TR_REDIS_ADDR: "redis:6379"
      TR_PROJECT_DIR: "/project" # baked starter project; override with a volume
      TR_ADMIN_TOKEN: "${TR_ADMIN_TOKEN:?set a strong admin token}"
    depends_on:
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    # Exposed via the host's cloudflared daemon: point that tunnel's ingress at
    # http://localhost:18000 (the published host port below) for tiny.ravencloak.org.

  # Marketing website (static Next.js export → nginx). Served at
  # tiny.ravencloak.org; point the host cloudflared tunnel ingress at
  # http://localhost:18080. The API lives separately at tiny-api.ravencloak.org.
  site:
    image: ghcr.io/ravencloak-org/tiny-site:latest
    pull_policy: always
    ports:
      - "${SITE_PORT:-18080}:80"
    restart: unless-stopped

volumes:
  clickhouse_data:
  redis_data:
