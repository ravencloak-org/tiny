# One-click production stack for Dokploy: ClickHouse + Redis + TinyRaven.
# Dokploy → Create → Docker Compose → point at this file. It clones the repo,
# so relative paths resolve. Set the env in Dokploy (or a .env next to this).
#
# Local test:  docker compose -f deploy/docker-compose.prod.yml up -d
services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3
    environment:
      CLICKHOUSE_DB: ${TR_CLICKHOUSE_DB:-tr_main}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data
    restart: unless-stopped

  tinyraven:
    image: ghcr.io/ravencloak-org/tiny:${TINYRAVEN_TAG:-latest}
    command: ["serve"]
    # Host port defaults to an uncommon value to dodge collisions on shared
    # hosts (Dokploy/Traefik often hold 80/8000/8080). Override with TR_PORT.
    # With Dokploy domain routing, the host publish is optional — Traefik reaches
    # the container's internal :8000 directly.
    ports:
      - "${TR_PORT:-18000}:8000"
    environment:
      TR_HTTP_ADDR: ":8000"
      TR_CLICKHOUSE_HTTP: "http://clickhouse:8123"
      TR_CLICKHOUSE_NATIVE: "clickhouse:9000"
      TR_CLICKHOUSE_DB: "${TR_CLICKHOUSE_DB:-tr_main}"
      TR_REDIS_ADDR: "redis:6379"
      TR_PROJECT_DIR: "/project" # baked starter project; override with a volume
      TR_ADMIN_TOKEN: "${TR_ADMIN_TOKEN:?set a strong admin token}"
    depends_on:
      clickhouse: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    # --- Option C: DockFlare (label-driven tunnel, host-wide control plane) ---
    # Run DockFlare as its OWN stack (upstream compose) on a shared external
    # network, then uncomment these so it auto-creates the tunnel route + DNS for
    # tiny.ravencloak.org (no dashboard step). DockFlare reaches this container by
    # the `tinyraven` alias only if both share a docker network — see docs.
    # labels:
    #   - dockflare.enable=true
    #   - dockflare.hostname=tiny.ravencloak.org
    #   - dockflare.service=http://tinyraven:8000

  # Cloudflare Tunnel — exposes tinyraven at your public hostname with no open
  # ports. Reaches the app over the compose network as http://tinyraven:8000.
  # Enable by setting BOTH:  CF_TUNNEL_TOKEN=<token>  and  COMPOSE_PROFILES=tunnel
  # Route is configured in the Cloudflare Zero Trust dashboard (Public Hostname:
  # tiny.ravencloak.org -> HTTP -> http://tinyraven:8000), which also manages DNS.
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - tinyraven
    restart: unless-stopped
    profiles: ["tunnel"]

volumes:
  clickhouse_data:
  redis_data:
