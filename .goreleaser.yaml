# GoReleaser v2 config for TinyRaven.
# Binary: tr   |   Package: tinyraven   |   Module main: ./cmd/tr
# Validate locally with:  goreleaser check
# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
# (see .github/workflows/goreleaser.yml)
version: 2

project_name: tinyraven

before:
  hooks:
    - go mod tidy

builds:
  - id: tr
    main: ./cmd/tr
    binary: tr
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Windows on arm64 is uncommon for a server binary; skip it.
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    ids:
      - tr
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    # tar.gz everywhere, zip on Windows.
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# GPG-sign the checksums file. Active only when a key is imported in CI
# (GPG_FINGERPRINT set by the import step); skipped on snapshots/local builds.
signs:
  - cmd: gpg
    artifacts: checksum
    signature: "${artifact}.sig"
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

# Linux system packages (.deb / .rpm) — package "tinyraven", binary "tr".
nfpms:
  - id: tinyraven
    package_name: tinyraven
    file_name_template: >-
      {{ .PackageName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    vendor: Ravencloak
    homepage: https://github.com/ravencloak-org/tiny
    maintainer: Ravencloak <oss@ravencloak.org>
    description: |-
      TinyRaven — open-source, self-hosted, drop-in alternative to Tinybird.
      Single Go binary (tr) in front of OSS ClickHouse + Redis.
    license: Apache-2.0
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/tinyraven/LICENSE
        type: doc
      - src: ./README.md
        dst: /usr/share/doc/tinyraven/README.md
        type: doc

# Homebrew tap — auto-updated on each release.
# Requires repo secret HOMEBREW_TAP_GITHUB_TOKEN with push access to the tap repo.
brews:
  - name: tinyraven
    ids:
      - default
    repository:
      owner: ravencloak-org
      name: homebrew-tinyraven
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/ravencloak-org/tiny
    description: "Open-source, self-hosted, drop-in alternative to Tinybird (binary: tr)"
    license: Apache-2.0
    commit_author:
      name: tinyraven-bot
      email: oss@ravencloak.org
    directory: Formula
    install: |
      bin.install "tr"
    test: |
      system "#{bin}/tr", "--version"

# ─────────────────────────────────────────────────────────────────────────────
# Extra package managers. Every block below is TOLERANT: each `disable:` guard
# resolves to true when its token/key env var is empty or absent, so a release
# NEVER fails just because a publisher isn't set up yet. `goreleaser check`
# passes regardless. To ACTIVATE a publisher you must do TWO things:
#   1. Create the target repo/secret listed in each block's comment.
#   2. Pass the matching secret as an env var in .github/workflows/goreleaser.yml
#      (alongside HOMEBREW_TAP_GITHUB_TOKEN), e.g.
#         SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
# Until both are done the block stays dormant (auto-disabled), not broken.
# ─────────────────────────────────────────────────────────────────────────────

# Scoop (Windows) — pushes a manifest to the bucket repo on each release.
# Prereq: create repo ravencloak-org/scoop-bucket + secret SCOOP_BUCKET_GITHUB_TOKEN.
# Install once active:  scoop bucket add tinyraven https://github.com/ravencloak-org/scoop-bucket
#                       scoop install tinyraven
scoops:
  - name: tinyraven
    ids:
      - default
    repository:
      owner: ravencloak-org
      name: scoop-bucket
      branch: main
      token: "{{ index .Env \"SCOOP_BUCKET_GITHUB_TOKEN\" }}"
    directory: bucket
    homepage: https://github.com/ravencloak-org/tiny
    description: "Open-source, self-hosted, drop-in alternative to Tinybird (binary: tr)"
    license: Apache-2.0
    commit_author:
      name: tinyraven-bot
      email: oss@ravencloak.org
    # Build the manifest always; only PUSH when the bucket token is present, so a
    # release never fails just because the bucket/secret isn't set up yet.
    skip_upload: '{{ if eq (index .Env "SCOOP_BUCKET_GITHUB_TOKEN") "" }}true{{ else }}false{{ end }}'

# Arch User Repository (AUR) — publishes a -bin PKGBUILD via SSH.
# Prereq: register the AUR package + secret AUR_KEY (the AUR account's SSH private key).
# Install once active:  yay -S tinyraven-bin   (or paru -S tinyraven-bin)
aurs:
  - name: tinyraven-bin
    ids:
      - default
    homepage: https://github.com/ravencloak-org/tiny
    description: "Open-source, self-hosted, drop-in alternative to Tinybird (binary: tr)"
    license: Apache-2.0
    maintainers:
      - "Ravencloak <oss@ravencloak.org>"
    private_key: "{{ index .Env \"AUR_KEY\" }}"
    git_url: "ssh://aur@aur.archlinux.org/tinyraven-bin.git"
    provides:
      - tinyraven
    conflicts:
      - tinyraven
    package: |-
      install -Dm755 "./tr" "${pkgdir}/usr/bin/tr"
      install -Dm644 "./LICENSE" "${pkgdir}/usr/share/licenses/tinyraven-bin/LICENSE"
    commit_author:
      name: tinyraven-bot
      email: oss@ravencloak.org
    # Dormant until AUR_KEY is wired into the release workflow.
    disable: '{{ eq (index .Env "AUR_KEY") "" }}'

# Nix — writes a default.nix to a NUR-style repo.
# Prereq: create repo ravencloak-org/nur + secret NUR_GITHUB_TOKEN.
# Install once active:  nix profile install github:ravencloak-org/nur#tinyraven
nix:
  - name: tinyraven
    ids:
      - default
    repository:
      owner: ravencloak-org
      name: nur
      branch: main
      token: "{{ index .Env \"NUR_GITHUB_TOKEN\" }}"
    path: pkgs/tinyraven/default.nix
    homepage: https://github.com/ravencloak-org/tiny
    description: "Open-source, self-hosted, drop-in alternative to Tinybird (binary: tr)"
    license: asl20 # nixpkgs license attr for Apache-2.0
    commit_author:
      name: tinyraven-bot
      email: oss@ravencloak.org
    # Build always; only PUSH when NUR_GITHUB_TOKEN is present (tolerant default).
    skip_upload: '{{ if eq (index .Env "NUR_GITHUB_TOKEN") "" }}true{{ else }}false{{ end }}'

# Winget — opens a PR to microsoft/winget-pkgs from a fork.
# Prereq: fork microsoft/winget-pkgs to ravencloak-org/winget-pkgs + secret WINGET_GITHUB_TOKEN.
# Install once active:  winget install Ravencloak.TinyRaven
winget:
  - name: tinyraven
    ids:
      - default
    publisher: Ravencloak
    package_identifier: Ravencloak.TinyRaven
    short_description: "Open-source, self-hosted, drop-in alternative to Tinybird (binary: tr)"
    license: Apache-2.0
    homepage: https://github.com/ravencloak-org/tiny
    repository:
      owner: ravencloak-org
      name: winget-pkgs
      branch: "tinyraven-{{ .Version }}"
      token: "{{ index .Env \"WINGET_GITHUB_TOKEN\" }}"
      pull_request:
        enabled: true
        draft: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_author:
      name: tinyraven-bot
      email: oss@ravencloak.org
    # Build always; only open the winget PR when WINGET_GITHUB_TOKEN is present.
    skip_upload: '{{ if eq (index .Env "WINGET_GITHUB_TOKEN") "" }}true{{ else }}false{{ end }}'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: ravencloak-org
    name: tiny
  draft: false
  prerelease: auto
